<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Analyzer</title>
    <link rel="stylesheet" href="PasswordAnalyzer.css">
</head>
<body>
    <div class="card">
        <h1>Password Analyzer</h1>
        <p class="subtitle">Check how strong your password is before you use it.</p>

        <div class="input-wrapper">
            <input type="password" id="passwordInput" placeholder="Enter a password...">
            <button id="revealBtn" class="reveal-btn" title="Hold to reveal">
                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
        </div>

        <div class="strength-bar-track">
            <div class="strength-bar-fill" id="strengthBarFill"></div>
        </div>

        <div id="strengthLabel"></div>

        <hr class="divider">

        <p class="feedback-heading" id="feedbackHeading" style="display:none;">Feedback</p>
        <ul id="feedbackList"></ul>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>
    <script src="ScoringFunction.js"></script>
    <script src="Interactions.js"></script>
</body>
</html>
